<form (ngSubmit)="login()">
  <div class="formed">

    <label for="name">First Name</label>
    <input
      type="text"
      id="name"
      name="name"
      [(ngModel)]="userData.name"
      placeholder="Enter first name"
    />

    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      name="email"
      [(ngModel)]="userData.email"
      placeholder="Enter email"
    />

    <button mat-raised-button   type="submit">
      Login
    </button>

  </div>
</form>
